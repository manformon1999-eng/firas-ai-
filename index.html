<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#262624" />
  <meta name="description" content="Firas AI — a premium bilingual AI assistant." />
  <title>Firas AI</title>

  <!-- Theme bootstrap (runs BEFORE styles paint → no flash): DARK is the default;
       a returning visitor who explicitly chose light keeps light. -->
  <script>
    try {
      var _t = localStorage.getItem("firas_ai_theme");
      document.documentElement.setAttribute("data-theme", _t === "light" ? "light" : "dark");
      if (_t !== "light") { var _m = document.querySelector('meta[name=theme-color]'); if (_m) _m.setAttribute("content", "#262624"); }
    } catch (e) {}
  </script>

  <!-- Favicon: the distinct Firas rounded-square mark (inline SVG data-URI) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%231F6F5F'/%3E%3Cstop offset='1' stop-color='%232C8A78'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='17' fill='url(%23g)'/%3E%3Cg fill='none' stroke='%23fff' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M24 46V20a4 4 0 0 1 4-4h13'/%3E%3Cpath d='M24 32h13'/%3E%3C/g%3E%3Ccircle cx='44' cy='44' r='5' fill='%23fff'/%3E%3C/svg%3E" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- CDN origins used below — preconnect so the first CSS/JS fetches skip DNS+TLS setup -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Highlight.js theme — NON-BLOCKING (media-swap): it only styles code blocks that app.js
       renders later, so first paint must not wait on this cross-origin CSS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    media="print" onload="this.media='all'"
  />

  <link rel="stylesheet" href="styles.css?v=native4" />

  <!-- KaTeX (math typesetting) — NON-BLOCKING for the same reason (math renders after boot) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    media="print" onload="this.media='all'" />

  <!-- CDN libs: all optional, app degrades gracefully if any fail to load -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <!-- mhchem: \ce{...} chemistry equations. Must load AFTER katex, BEFORE auto-render runs. -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/mhchem.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <!-- Optional Firebase config (real keys, git-ignored). Copy firebase-config.example.js
       to firebase-config.js to enable "Continue with Google". Loaded BEFORE app.js so
       window.FIREBASE_CONFIG is available at boot; the file is optional and the app
       degrades gracefully (email/password still works) when it's absent. -->
  <script defer src="firebase-config.js"></script>

  <script defer src="app.js?v=native4"></script>
</head>
<body>
  <!-- ===== Mobile drawer scrim ===== -->
  <div class="scrim" id="scrim" aria-hidden="true"></div>

  <!-- ===== Landing / hero (shown FIRST to logged-out visitors) ===== -->
  <div class="landing" id="landingScreen" hidden>
    <div class="landing__bg" aria-hidden="true">
      <span class="landing__orb landing__orb--1"></span>
      <span class="landing__orb landing__orb--2"></span>
      <span class="landing__orb landing__orb--3"></span>
    </div>
    <div class="landing__inner">
      <span class="nib is-aurora landing__mark" data-size="xl" aria-hidden="true"><span class="glyph">F</span></span>
      <h1 class="landing__wordmark">
        <span class="wordmark"><span class="firas">Firas</span>&nbsp;<span class="ai">AI</span></span>
      </h1>
      <p class="landing__about" id="landingAbout"></p>
      <button type="button" class="landing__cta" id="landingStart"></button>
      <div class="landing__stats" id="landingStats"></div>
    </div>
    <section class="landing__details" id="landingDetails"></section>
  </div>

  <!-- ===== Auth screen (shown when logged out) ===== -->
  <div class="auth" id="authScreen" hidden>
    <div class="auth__card">
      <button type="button" class="auth__brand auth__brand-btn" id="authBackLogo" aria-label="Firas AI">
        <span class="nib is-aurora" data-size="lg" aria-hidden="true"><span class="glyph">F</span></span>
        <span class="wordmark"><span class="firas">Firas</span>&nbsp;<span class="ai">AI</span></span>
      </button>
      <h1 class="auth__title" id="authTitle"></h1>
      <p class="auth__subtitle" id="authSubtitle"></p>

      <!-- Continue with Google (Firebase) — hidden until window.FIREBASE_CONFIG is present -->
      <button type="button" class="auth__google" id="authGoogle" hidden>
        <span class="auth__google-icon" aria-hidden="true">
          <svg viewBox="0 0 18 18" width="18" height="18">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18Z"/>
            <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33Z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z"/>
          </svg>
        </span>
        <span class="auth__google-label" id="authGoogleLabel"></span>
      </button>

      <!-- Subtle divider between Google and email/password (hidden with the button) -->
      <div class="auth__divider" id="authDivider" hidden><span id="authDividerText"></span></div>

      <form class="auth__form" id="authForm" novalidate>
        <label class="auth__field" id="authNameField">
          <span class="auth__label" data-i18n="authName">الاسم</span>
          <input type="text" id="authName" name="name" autocomplete="name" />
        </label>
        <label class="auth__field">
          <span class="auth__label" data-i18n="authEmail">البريد الإلكتروني</span>
          <input type="email" id="authEmail" name="email" autocomplete="email" required />
        </label>
        <label class="auth__field">
          <span class="auth__label" data-i18n="authPassword">كلمة المرور</span>
          <input type="password" id="authPassword" name="password" autocomplete="current-password" required />
        </label>
        <label class="auth__field" id="authCodeField" hidden>
          <span class="auth__label" id="authCodeLabel"></span>
          <input type="text" id="authCode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" />
        </label>

        <button type="button" class="auth__forgot" id="authForgot" hidden></button>
        <button type="button" class="auth__forgot" id="authResend" hidden></button>
        <button type="button" class="auth__back" id="authBack" hidden></button>

        <p class="auth__error" id="authError" role="alert" hidden></p>
        <p class="auth__note" id="authNote" role="status" hidden></p>

        <button type="submit" class="auth__submit" id="authSubmit"></button>
      </form>

      <p class="auth__switch">
        <span id="authSwitchText"></span>
        <button type="button" class="auth__switch-btn" id="authSwitchBtn"></button>
      </p>
    </div>

    <!-- Cookie consent — shown only on the auth screen, only until a choice is saved -->
    <div class="cookie-consent" id="cookieBanner" dir="ltr" hidden role="region" aria-label="Cookie consent">
      <p class="cookie-consent__text">We use cookies to keep you signed in and to improve your experience. Do you want to enable cookies?</p>
      <div class="cookie-consent__actions">
        <button type="button" class="cookie-consent__btn cookie-consent__reject" id="cookieReject">Reject</button>
        <button type="button" class="cookie-consent__btn cookie-consent__accept" id="cookieAccept">Accept</button>
      </div>
    </div>
  </div>

  <!-- ===== App shell ===== -->
  <div class="app" id="appShell" hidden>

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" id="sidebar" aria-label="Conversations">
      <div class="sidebar__head">
        <a class="logo-lockup" href="#" id="sidebarLogo" aria-label="Firas AI home">
          <span class="nib" aria-hidden="true"><span class="glyph">F</span></span>
          <span class="wordmark"><span class="firas">Firas</span>&nbsp;<span class="ai">AI</span></span>
        </a>
        <button class="icon-btn sidebar__close" id="drawerClose" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
      </div>

      <!-- Product switcher: Firas AI / Firas Agent / Firas Code -->
      <button class="product-switch" id="productSwitch" aria-haspopup="menu" aria-label="Switch product">
        <span class="product-switch__dot" aria-hidden="true"></span>
        <span class="product-switch__name" id="productSwitchName">Firas AI</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="product-switch__chev"><path d="M6 9l6 6 6-6"/></svg>
      </button>

      <button class="btn-newchat" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span data-i18n="newChat">محادثة جديدة</span>
      </button>

      <div class="sidebar__search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="searchInput" name="conversationSearch" autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other" data-i18n-ph="searchPlaceholder" placeholder="ابحث في المحادثات" aria-label="Search conversations" />
      </div>

      <nav class="history" id="historyList" aria-label="Conversation history"></nav>

      <div class="account-pill" id="accountPill">
        <span class="account-pill__avatar" id="accountAvatar">F</span>
        <span class="account-pill__name" id="accountName">Firas</span>
        <button class="account-pill__settings" id="settingsBtn" type="button" aria-label="Settings" data-i18n-title="settings" title="الإعدادات">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
        </button>
        <button class="account-pill__logout" id="logoutBtn" type="button" aria-label="Logout" data-i18n-title="logout" title="تسجيل الخروج">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </aside>

    <!-- ===== Main column ===== -->
    <main class="main">
      <!-- Top bar -->
      <header class="topbar">
        <!-- Mobile: drawer toggle (hamburger — opens the menu) -->
        <button class="icon-btn topbar__mobile-only" id="drawerOpen" aria-label="Open menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>

        <!-- Desktop: collapse/restore the sidebar (hamburger). Hidden on mobile. -->
        <button class="icon-btn topbar__sidebar-toggle topbar__desktop-only" id="sidebarToggle" aria-label="Toggle sidebar" aria-expanded="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>

        <!-- Desktop: logo lockup — shown only when the sidebar is collapsed (avoids
             a duplicate mark while the sidebar's own logo is visible). -->
        <a class="logo-lockup topbar__desktop-mark" href="#" aria-label="Firas AI">
          <span class="nib" id="topbarNib" aria-hidden="true"><span class="glyph">F</span></span>
          <span class="wordmark"><span class="firas">Firas</span>&nbsp;<span class="ai">AI</span></span>
        </a>

        <!-- Mobile: centered wordmark -->
        <span class="wordmark topbar__wordmark-center topbar__mobile-only" aria-hidden="true"><span class="firas">Firas</span>&nbsp;<span class="ai">AI</span></span>

        <div class="topbar__spacer"></div>

        <!-- Tier switcher -->
        <div class="tier-switch" id="tierSwitch" role="tablist" aria-label="Firas AI model tier"></div>

        <button class="topbar__newchat topbar__mobile-only-hide" id="topbarNewChat" aria-label="New chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          <span class="topbar__newchat-label" data-i18n="newChatShort">جديد</span>
        </button>

        <!-- Share the open chat as a public read-only link -->
        <button class="icon-btn" id="shareChatBtn" aria-label="Share chat" title="مشاركة المحادثة">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
        </button>

        <!-- Notifications / site updates -->
        <button class="icon-btn topbar__notify" id="notifyBtn" aria-label="Updates" title="تحديثات الموقع">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span class="notify-badge" id="notifyBadge" hidden></span>
        </button>
        <!-- Theme toggle moved into Settings (Appearance card) — the topbar was overflowing on phones -->
      </header>

      <!-- Chat scroll region -->
      <div class="chat-scroll" id="chatScroll">
        <!-- Welcome screen OR chat thread rendered here -->
        <div class="chat-inner" id="chatThread"></div>
        <div id="welcome"></div>
      </div>

      <!-- Composer -->
      <div class="composer-wrap">
        <!-- Scroll-to-bottom: anchored just above the composer on every device -->
        <button class="scroll-bottom" id="scrollBottomBtn" aria-label="Scroll to latest">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
        </button>
        <form class="composer" id="composer">
          <div class="attach-tray" id="attachTray" aria-label="Attached images"></div>
          <input type="file" id="fileInput" accept="image/*,application/pdf,.pdf,.txt,.md,.markdown,.csv,.tsv,.json,.jsonl,.xml,.yml,.yaml,.html,.htm,.css,.scss,.js,.jsx,.mjs,.cjs,.ts,.tsx,.py,.java,.c,.h,.cpp,.cc,.hpp,.cs,.go,.rs,.rb,.php,.swift,.kt,.sql,.sh,.bash,.ini,.toml,.env,.log,.tex,.srt,.vtt,text/*" multiple hidden />
          <div class="composer__row">
          <textarea
            class="composer__textarea"
            id="input"
            rows="1"
            data-i18n-ph="composerPlaceholder"
            placeholder="اسأل فِراس..."
            aria-label="Message Firas AI"
          ></textarea>
          <div class="composer__tools">
            <!-- Response MODE selector (Auto / Plan) — compact dropdown, built in app.js -->
            <div class="mode-select" id="modeSwitch"></div>
            <!-- Tools "+" menu: Web search + Thinking toggles (compact, fits any screen) -->
            <div class="tools-menu" id="toolsMenu">
              <button type="button" class="tools-menu__trigger" id="toolsMenuBtn" aria-haspopup="true" aria-expanded="false" aria-label="أدوات" title="أدوات">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              </button>
              <div class="tools-menu__panel" id="toolsMenuPanel" hidden>
                <button type="button" class="tools-menu__item" id="searchToggle" role="switch" aria-checked="false">
                  <span class="tools-menu__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18 15 15 0 0 1 0-18Z"/></svg></span>
                  <span class="tools-menu__label" data-i18n="webSearch">بحث الويب</span>
                  <span class="tools-menu__switch" aria-hidden="true"></span>
                </button>
                <button type="button" class="tools-menu__item" id="thinkToggle" role="switch" aria-checked="true">
                  <span class="tools-menu__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2h6c0-.8.4-1.5 1-2A7 7 0 0 0 12 2Z"/><path d="M9 18h6M10 22h4"/></svg></span>
                  <span class="tools-menu__label" data-i18n="thinking">التفكير</span>
                  <span class="tools-menu__switch" aria-hidden="true"></span>
                </button>
              </div>
            </div>
          </div>
          <!-- Trailing action cluster: [attach][send] together -->
          <div class="composer__actions">
            <button type="button" class="icon-btn composer__attach" id="attachBtn" aria-label="Attach">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.4 11.1-9.2 9.2a5 5 0 0 1-7-7l9.2-9.2a3.3 3.3 0 0 1 4.7 4.7l-9.2 9.2a1.7 1.7 0 0 1-2.4-2.4l8.5-8.5"/></svg>
            </button>
            <button type="submit" class="composer__send" id="sendBtn" aria-label="Send" disabled>
              <svg class="ico-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
              <svg class="ico-stop" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
          </div>
          </div>
        </form>
        <p class="composer__hint" data-i18n="disclaimer">قد يخطئ فِراس. تحقّق من المعلومات المهمة.</p>
      </div>
    </main>
  </div>

  <!-- Live region for screen-reader announcements -->
  <div class="sr-only" id="liveRegion" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
